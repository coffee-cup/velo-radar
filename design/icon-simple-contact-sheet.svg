<svg width="1500" height="1100" viewBox="0 0 1500 1100" xmlns="http://www.w3.org/2000/svg">
  <title>Simple bike radar icon iterations</title>
  <rect width="1500" height="1100" fill="#F8FAFC"/>
  <text x="70" y="84" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="44" font-weight="700" fill="#0F172A">Simple bike/radar iterations</text>
  <text x="70" y="126" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#475569">One foreground color + one background color. 3–4 SVG shapes each.</text>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" fill="#0F172A">
    <g transform="translate(70 190)">
      <image href="icon-11-cream-center-bike-sweep.svg" width="300" height="300"/>
      <text x="0" y="350" font-weight="700">11 Cream center bike</text>
    </g>
    <g transform="translate(450 190)">
      <image href="icon-12-ink-center-bike-sweep.svg" width="300" height="300"/>
      <text x="0" y="350" font-weight="700">12 Ink center bike</text>
    </g>
    <g transform="translate(830 190)">
      <image href="icon-13-forest-center-bike-sweep.svg" width="300" height="300"/>
      <text x="0" y="350" font-weight="700">13 Forest center bike</text>
    </g>

    <g transform="translate(70 650)">
      <image href="icon-14-cream-target-bike-sweep.svg" width="300" height="300"/>
      <text x="0" y="350" font-weight="700">14 Cream target bike</text>
    </g>
    <g transform="translate(450 650)">
      <image href="icon-15-ink-target-bike-sweep.svg" width="300" height="300"/>
      <text x="0" y="350" font-weight="700">15 Ink target bike</text>
    </g>
    <g transform="translate(830 650)">
      <rect width="300" height="300" rx="66" fill="#F7F1E6"/>
      <image href="icon-16-transparent-bike-radar-mark.svg" width="300" height="300"/>
      <text x="0" y="350" font-weight="700">16 Transparent mark</text>
    </g>
  </g>
</svg>
