name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project wherebixi-ios/wherebixi.xcodeproj \
            -scheme wherebixi \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.4.1' \
            CODE_SIGNING_ALLOWED=NO
